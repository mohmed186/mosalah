<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>السلة وإتمام الطلب</title><link rel="stylesheet" href="assets/marketplace.css"></head><body><div id="header"></div><section class="page-banner"><div class="container"><h1>سلة المشتريات</h1><p class="muted">سيتم تقسيم الطلب تلقائيًا بين المتاجر المختلفة.</p></div></section><main class="section"><div class="container checkout-grid"><section><div id="cart" class="cart-list"></div></section><aside><div class="panel"><h2>ملخص الطلب</h2><div class="summary-line"><span>الإجمالي الفرعي</span><strong id="subtotal">0</strong></div><div class="summary-line"><span>الشحن</span><strong>مجاني حاليًا</strong></div><div class="summary-line summary-total"><span>الإجمالي</span><strong id="total">0</strong></div></div><form id="checkoutForm" class="panel"><h2>بيانات الاستلام</h2><div id="msg" class="message"></div><div class="form-group"><label>الاسم</label><input id="customerName" class="field" required></div><div class="form-row"><div class="form-group"><label>البريد</label><input id="email" class="field" type="email" required></div><div class="form-group"><label>الهاتف</label><input id="phone" class="field" required></div></div><div class="form-row"><div class="form-group"><label>المدينة</label><input id="city" class="field"></div><div class="form-group"><label>طريقة الدفع</label><select id="paymentMethod" class="select"><option value="cash_on_delivery">الدفع عند الاستلام</option><option value="bank_transfer">تحويل بنكي يدوي</option></select></div></div><div class="form-group"><label>العنوان بالتفصيل</label><textarea id="address" class="textarea" rows="3" required></textarea></div><div class="form-group"><label>ملاحظات</label><textarea id="notes" class="textarea" rows="2"></textarea></div><button class="btn btn-primary" style="width:100%">تأكيد الطلب</button></form></aside></div></main><script src="assets/common.js"></script><script>
header.innerHTML=renderHeader();function render(){if(!State.cart.length){cart.innerHTML='<div class="card empty"><h2>السلة فارغة</h2><p>أضف بعض المنتجات أولًا.</p><a class="btn btn-primary" href="shop.html">تصفح المنتجات</a></div>';checkoutForm.classList.add('hidden')}else{checkoutForm.classList.remove('hidden');cart.innerHTML=State.cart.map((i,idx)=>`<div class="cart-item card"><img src="${imageSrc(i.image)}"><div><strong>${esc(i.name)}</strong><div class="muted">${esc(i.store_name||'متجر')}</div><div class="price">${money(i.price)}</div></div><div><div class="qty"><button data-minus="${idx}">−</button><strong>${i.quantity}</strong><button data-plus="${idx}">+</button></div><button class="btn btn-danger btn-sm" data-remove="${idx}" style="margin-top:7px">حذف</button></div></div>`).join('')}const sum=State.cart.reduce((s,i)=>s+Number(i.price)*Number(i.quantity),0);subtotal.textContent=total.textContent=money(sum);document.querySelectorAll('[data-minus]').forEach(b=>b.onclick=()=>{const i=State.cart[b.dataset.minus];i.quantity=Math.max(1,i.quantity-1);saveCart();render()});document.querySelectorAll('[data-plus]').forEach(b=>b.onclick=()=>{const i=State.cart[b.dataset.plus];i.quantity=Math.min(i.stock||99,i.quantity+1);saveCart();render()});document.querySelectorAll('[data-remove]').forEach(b=>b.onclick=()=>{State.cart.splice(Number(b.dataset.remove),1);saveCart();render()})}render();if(State.user){customerName.value=State.user.name||'';email.value=State.user.email||'';phone.value=State.user.phone||''}
checkoutForm.onsubmit=async e=>{e.preventDefault();try{const d=await API.post('/api/orders',{customerName:customerName.value,email:email.value,phone:phone.value,city:city.value,address:address.value,notes:notes.value,paymentMethod:paymentMethod.value,items:State.cart.map(i=>({productId:i.id,quantity:i.quantity}))});State.cart=[];saveCart();localStorage.setItem('lastOrder',JSON.stringify(d));location.href='order-success.html'}catch(err){msg.className='message error show';msg.textContent=err.message}};
</script></body></html>
