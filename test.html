<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نظام الريان - ورديات وكاشير</title>
  <style>
    :root{
      --bg:#f4f6fb;
      --card:#fff;
      --ink:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --main:#5b2c83;
      --main2:#7c3aed;
      --dark:#121827;
      --good:#16a34a;
      --bad:#dc2626;
      --warn:#f59e0b;
      --blue:#2563eb;
      --soft:#f1f5f9;
      --shadow:0 14px 35px rgba(15,23,42,.08);
      --r:22px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--ink);
      font-family:Tahoma, Arial, sans-serif;
    }
    button,input,select,textarea{font-family:inherit}
    button{border:0; cursor:pointer}
    .hidden{display:none !important}

    .btn{
      border-radius:15px;
      padding:12px 15px;
      font-weight:900;
      min-height:42px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      transition:.16s;
      text-decoration:none;
      white-space:nowrap;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn-main{background:var(--main);color:#fff}
    .btn-main:hover{background:#42165f}
    .btn-soft{background:var(--soft);color:var(--ink)}
    .btn-good{background:var(--good);color:#fff}
    .btn-bad{background:var(--bad);color:#fff}
    .btn-warn{background:var(--warn);color:#fff}
    .btn-blue{background:var(--blue);color:#fff}
    .btn-outline{background:#fff;border:1px solid var(--line);color:var(--ink)}
    .btn-sm{padding:8px 10px; min-height:32px; border-radius:12px; font-size:13px}
    .btn-full{width:100%}

    input,select,textarea{
      width:100%;
      border:1px solid var(--line);
      border-radius:15px;
      padding:12px 13px;
      outline:none;
      font-size:14px;
      background:#fff;
      color:var(--ink);
    }
    input:focus,select:focus,textarea:focus{
      border-color:var(--main2);
      box-shadow:0 0 0 3px rgba(124,58,237,.12);
    }
    label{display:block;margin:10px 0 6px;font-weight:900;font-size:13px}

    .login{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:18px;
      background:
        radial-gradient(circle at top right,rgba(91,44,131,.24),transparent 33%),
        radial-gradient(circle at bottom left,rgba(245,158,11,.18),transparent 33%),
        var(--bg);
    }
    .login-card{
      width:min(760px,100%);
      background:#fff;
      border-radius:30px;
      box-shadow:var(--shadow);
      padding:26px;
    }
    .brand{text-align:center;margin-bottom:20px}
    .brand h1{margin:0;color:var(--main);font-size:34px}
    .brand p{margin:8px 0 0;color:var(--muted);line-height:1.7}
    .user-choices{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
      margin:20px 0;
    }
    .user-choice{
      padding:20px;
      border-radius:22px;
      background:#f8fafc;
      border:2px solid transparent;
      text-align:center;
      font-weight:900;
      min-height:110px;
    }
    .user-choice span{display:block;color:var(--muted);font-size:13px;margin-top:8px}
    .user-choice.active{
      border-color:var(--main);
      background:#f3e8ff;
      color:var(--main);
    }
    .login-pass{
      width:min(420px,100%);
      margin:auto;
    }
    .hint{
      background:#f8fafc;
      color:#475569;
      border-radius:18px;
      padding:12px 14px;
      line-height:1.8;
      font-size:13px;
      margin-top:12px;
    }

    .app{
      min-height:100vh;
      display:grid;
      grid-template-columns:260px 1fr;
    }
    .sidebar{
      background:var(--dark);
      color:#fff;
      padding:18px;
      height:100vh;
      overflow:auto;
      position:sticky;
      top:0;
    }
    .side-brand{
      border-bottom:1px solid rgba(255,255,255,.12);
      padding:6px 6px 16px;
      margin-bottom:14px;
    }
    .side-brand h2{margin:0;font-size:25px}
    .side-brand p{margin:8px 0 0;color:#cbd5e1;font-size:13px;line-height:1.6}
    .nav{display:grid;gap:8px}
    .nav button{
      background:transparent;
      color:#e5e7eb;
      border-radius:15px;
      padding:12px 13px;
      font-weight:900;
      text-align:right;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }
    .nav button.active,.nav button:hover{background:rgba(255,255,255,.12);color:#fff}
    .user-panel{
      margin-top:16px;
      padding:13px;
      border-radius:18px;
      background:rgba(255,255,255,.08);
      line-height:1.9;
      color:#e5e7eb;
      font-size:13px;
    }

    .content{padding:18px;overflow:auto}
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      background:#fff;
      border-radius:var(--r);
      box-shadow:var(--shadow);
      padding:16px 18px;
      margin-bottom:16px;
    }
    .topbar h1{margin:0;font-size:25px}
    .topbar p{margin:5px 0 0;color:var(--muted);font-size:13px}

    .card{
      background:#fff;
      border-radius:var(--r);
      box-shadow:var(--shadow);
      padding:17px;
      margin-bottom:16px;
    }
    .card-title{
      margin:0 0 14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      font-size:18px;
    }
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .stat{
      background:#fff;
      border-radius:var(--r);
      box-shadow:var(--shadow);
      padding:18px;
    }
    .stat span{color:var(--muted);font-size:13px;font-weight:900}
    .stat strong{display:block;color:var(--main);font-size:27px;margin-top:9px}

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius:999px;
      background:#f1f5f9;
      color:#64748b;
      padding:5px 9px;
      font-weight:900;
      font-size:12px;
      white-space:nowrap;
    }
    .badge.good{background:#dcfce7;color:#166534}
    .badge.bad{background:#fee2e2;color:#991b1b}
    .badge.warn{background:#fef3c7;color:#92400e}

    .layout-pos{
      display:grid;
      grid-template-columns:1fr 430px;
      gap:16px;
    }
    .tabs{display:flex;gap:9px;flex-wrap:wrap;margin:12px 0}
    .tab{
      padding:10px 14px;
      border-radius:999px;
      background:var(--soft);
      color:#334155;
      font-weight:900;
    }
    .tab.active{background:var(--main);color:#fff}

    .menu-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:11px;
    }
    .menu-item{
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      min-height:110px;
      text-align:right;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      transition:.16s;
    }
    .menu-item:hover{transform:translateY(-2px);border-color:#c4b5fd;box-shadow:0 12px 22px rgba(15,23,42,.08)}
    .menu-item .name{font-weight:900;font-size:17px;line-height:1.45}
    .meta{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:12px}
    .price{color:var(--main);font-weight:900;font-size:19px;white-space:nowrap}

    .receipt-box{
      background:#fff;
      border-radius:var(--r);
      box-shadow:var(--shadow);
      padding:17px;
      position:sticky;
      top:18px;
    }
    .printable{
      background:#fbfbfc;
      border:1px solid var(--line);
      border-radius:18px;
      padding:15px;
    }
    .receipt-head{
      text-align:center;
      padding-bottom:12px;
      border-bottom:1px dashed #cbd5e1;
      margin-bottom:12px;
    }
    .receipt-head h2{margin:0;color:var(--main);font-size:25px}
    .receipt-head p{margin:5px 0 0;color:var(--muted);font-size:13px;line-height:1.6}
    .receipt-info{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:6px;
      background:#f8fafc;
      border-radius:14px;
      padding:10px;
      font-size:13px;
      color:#334155;
      margin-bottom:11px;
    }
    .cart-empty{
      padding:25px 10px;
      text-align:center;
      border:1px dashed #cbd5e1;
      border-radius:15px;
      color:#94a3b8;
      font-weight:900;
    }
    .cart-line{
      background:#fff;
      border:1px solid var(--line);
      border-radius:15px;
      padding:10px;
      margin-bottom:8px;
    }
    .line-top{display:flex;justify-content:space-between;gap:8px;font-weight:900}
    .line-sub{margin-top:5px;color:var(--muted);font-size:13px}
    .qty-row{display:flex;justify-content:space-between;align-items:center;margin-top:9px}
    .qty-controls{display:flex;gap:8px;align-items:center}
    .round{
      width:32px;height:32px;border-radius:50%;
      background:#f1f5f9;
      font-weight:900;
      font-size:17px;
    }
    .round.del{background:#fee2e2;color:var(--bad)}
    .summary{border-top:1px dashed #cbd5e1;margin-top:12px;padding-top:10px}
    .sum-row{display:flex;justify-content:space-between;padding:5px 0;font-size:14px}
    .sum-row.total{
      border-top:1px solid var(--line);
      margin-top:5px;
      padding-top:10px;
      color:var(--main);
      font-size:22px;
      font-weight:900;
    }

    .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:18px;background:#fff}
    table{width:100%;border-collapse:collapse;min-width:780px}
    th,td{
      padding:11px 12px;
      border-bottom:1px solid var(--line);
      text-align:right;
      vertical-align:middle;
      font-size:14px;
    }
    th{background:#f8fafc;color:#475569;font-size:13px;white-space:nowrap}
    tr:last-child td{border-bottom:0}
    .actions{display:flex;gap:6px;flex-wrap:wrap}

    .modal{
      position:fixed;
      inset:0;
      background:rgba(15,23,42,.52);
      z-index:60;
      display:grid;
      place-items:center;
      padding:16px;
    }
    .modal-card{
      width:min(860px,100%);
      max-height:90vh;
      overflow:auto;
      background:#fff;
      border-radius:24px;
      padding:20px;
      box-shadow:var(--shadow);
    }
    .modal-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:12px;
    }
    .modal-head h2{margin:0;color:var(--main)}

    .toast{
      position:fixed;
      left:18px;
      bottom:18px;
      background:#111827;
      color:#fff;
      border-radius:16px;
      padding:13px 16px;
      box-shadow:var(--shadow);
      z-index:80;
      opacity:0;
      transform:translateY(12px);
      transition:.2s;
      pointer-events:none;
      max-width:380px;
      line-height:1.6;
    }
    .toast.show{opacity:1;transform:translateY(0)}

    .mini-list{margin:8px 0 0;padding:0 18px 0 0;line-height:1.9;color:#334155}
    .form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .form-grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}

    @media(max-width:1200px){
      .layout-pos{grid-template-columns:1fr}
      .receipt-box{position:static}
      .menu-grid{grid-template-columns:repeat(3,1fr)}
      .grid-4{grid-template-columns:repeat(2,1fr)}
    }
    @media(max-width:850px){
      .app{grid-template-columns:1fr}
      .sidebar{height:auto;position:static}
      .nav{grid-template-columns:repeat(2,1fr)}
      .content{padding:12px}
      .topbar{flex-direction:column;align-items:flex-start}
      .user-choices,.grid-4,.grid-3,.grid-2,.form-grid,.form-grid-2{grid-template-columns:1fr}
      .menu-grid{grid-template-columns:repeat(2,1fr)}
    }
    @media print{
      body{background:#fff}
      body *{visibility:hidden !important}
      .printable,.printable *{visibility:visible !important}
      .printable{
        position:absolute;
        inset:0;
        width:100%;
        border:0;
        border-radius:0;
        background:#fff;
        padding:0;
      }
      .no-print,.no-print *{display:none !important}
      .qty-row{display:none !important}
      .receipt-head h2{color:#000}
    }
  </style>
</head>

const navLabels = {

  pos:"الكاشير",
  shift:"الوردية",
  expenses:"المصروفات",
  prices:"تحديث الأسعار",

  reports:"التقارير",
  users:"المستخدمين",
  settings:"الإعدادات"
};

const roleLabels = {admin:"أدمن", cashier:"كاشير"};
const $ = (id)=>document.getElementById(id);
const money = (n)=>`${Number(n || 0).toLocaleString("ar-EG")} ج`;
const uid = ()=>Date.now() + Math.floor(Math.random()*999);
const dateOnly = (d)=>String(d || "").slice(0,10);
const todayStr = ()=>new Date().toISOString().slice(0,10);

function loadDB(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(defaultData));
    return structuredClone(defaultData);
  }
  try{
    const parsed = JSON.parse(raw);
    const merged = {...structuredClone(defaultData), ...parsed};
    ["users","products","shifts","sales","expenses","priceHistory"].forEach(k=>{
      if(!Array.isArray(merged[k])) merged[k] = [];
    });
    return merged;
  }catch(e){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(defaultData));
    return structuredClone(defaultData);
  }
}
function saveDB(){localStorage.setItem(STORAGE_KEY, JSON.stringify(db))}
function toast(msg){
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
}

function renderLoginChoices(){
  const box = $("loginUserChoices");
  const users = db.users.filter(u=>["admin","cashier1","cashier2"].includes(u.username));
  box.innerHTML = users.map(u=>`
    <button class="user-choice ${selectedLoginUser===u.username?"active":""}" onclick="selectLoginUser('${u.username}')">
      ${u.name}
      <span>${roleLabels[u.role]}</span>
    </button>
  `).join("");
}
function selectLoginUser(username){
  selectedLoginUser = username;
  renderLoginChoices();
  $("loginPassword").focus();
}
function login(){
  const password = $("loginPassword").value;
  const user = db.users.find(u=>u.username===selectedLoginUser && u.password===password && u.active);
  if(!user){toast("كلمة المرور غير صحيحة أو المستخدم موقوف.");return}
  session = {id:user.id, username:user.username, name:user.name, role:user.role};
  sessionStorage.setItem("rayyanSessionV3", JSON.stringify(session));
  startApp();
}
function logout(){
  sessionStorage.removeItem("rayyanSessionV3");
  session = null;
  location.reload();
}
function can(page){
  return session && pageMeta[page].roles.includes(session.role);
}
function startApp(){
  $("loginScreen").classList.add("hidden");
  $("app").classList.remove("hidden");
  $("currentUserName").textContent = session.name;
  $("currentUserRole").textContent = roleLabels[session.role];
  activePage = session.role === "admin" ? "dashboard" : "shift";
  renderNav();
  showPage(activePage);
}
function renderNav(){
  const nav = $("nav");
  nav.innerHTML = "";
  Object.keys(pageMeta).forEach(page=>{
    if(!can(page)) return;
    const btn = document.createElement("button");
    btn.className = page===activePage ? "active" : "";
    btn.innerHTML = `<span>${navLabels[page]}</span><span>›</span>`;
    btn.onclick = ()=>showPage(page);
    nav.appendChild(btn);
  });
  updateShiftLine();
}
function showPage(page){
  if(!can(page)){toast("ليس لديك صلاحية لهذه الصفحة.");return}
  activePage = page;
  document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
  $(`page-${page}`).classList.remove("hidden");
  $("pageTitle").textContent = pageMeta[page].title;
  $("pageSubtitle").textContent = pageMeta[page].subtitle;
  renderNav();

  if(page==="dashboard") renderDashboard();
  if(page==="pos") renderPOS();
  if(page==="shift") renderShift();
  if(page==="expenses") renderExpenses();
  if(page==="prices") renderPrices();
  if(page==="products") renderProducts();
  if(page==="reports") renderReports();
  if(page==="users") renderUsers();
  if(page==="settings") renderSettings();
}

function currentShift(){
  if(!session || session.role!=="cashier") return null;
  return db.shifts.find(s=>s.cashierId===session.id && s.status==="open") || null;
}
function updateShiftLine(){
  const line = $("currentShiftLine");
  if(!line || !session) return;
  if(session.role==="admin"){
    line.innerHTML = `النظام: <b>إدارة كاملة</b>`;
    return;
  }
  const sh = currentShift();
  line.innerHTML = sh ? `الوردية: <b>مفتوحة #${sh.id}</b>` : `الوردية: <b>لا توجد وردية مفتوحة</b>`;
}
function requireShiftHTML(){
  return `
    <div class="card">
      <h3 class="card-title">لا توجد وردية مفتوحة</h3>
      <div class="hint">لا يمكن البيع أو تسجيل المصروفات قبل فتح وردية للكاشير الحالي.</div>
      <button class="btn btn-main" onclick="showPage('shift')">فتح الوردية</button>
    </div>
  `;
}
function shiftData(shiftId){
  const sales = db.sales.filter(s=>s.shiftId===shiftId);
  const expenses = db.expenses.filter(e=>e.shiftId===shiftId);
  const totalSales = sales.reduce((sum,s)=>sum+Number(s.total||0),0);
  const totalExpenses = expenses.reduce((sum,e)=>sum+Number(e.amount||0),0);
  const net = totalSales - totalExpenses;
  const items = {};
  sales.forEach(s=>{
    (s.items||[]).forEach(i=>{
      if(!items[i.name]) items[i.name] = {name:i.name, qty:0, total:0};
      items[i.name].qty += Number(i.qty||0);
      items[i.name].total += Number(i.qty||0) * Number(i.price||0);
    });
  });
  const topItems = Object.values(items).sort((a,b)=>b.qty-a.qty);
  const byPayment = groupSum(sales,"paymentType","total");
  return {sales,expenses,totalSales,totalExpenses,net,topItems,byPayment};
}

      ${salesTable(d.sales.slice().reverse(), false)}

function openShift(){
  if(currentShift()){toast("توجد وردية مفتوحة بالفعل.");return}
  const sh = {
    id:uid(),
    cashierId:session.id,
    cashierName:session.name,
    start:new Date().toISOString(),
    end:null,
    status:"open",
    openingCash:Number($("openCash").value || 0),
    openNote:$("openNote").value.trim(),
    closingCash:0,
    closeNote:"",
    totals:null
  };
  db.shifts.push(sh);
  saveDB();
  toast("تم فتح الوردية.");
  showPage("pos");
}
function showCloseShiftModal(){
  const sh = currentShift();
  if(!sh) return;
  const d = shiftData(sh.id);
  showModal(`
    <div class="modal-head no-print">
      <h2>تقرير قفل الوردية</h2>
      <button class="btn btn-soft" onclick="closeModal()">×</button>
    </div>
    <div id="shiftCloseReport" class="printable">
      ${shiftReportHTML(sh,d,false)}
    </div>
    <div class="no-print" style="margin-top:12px;">
      <div class="form-grid-2">
        <div>
          <label>النقدية الموجودة في الدرج عند القفل</label>
          <input id="closingCash" type="number" min="0" placeholder="اختياري" />
        </div>
        <div>
          <label>ملاحظة القفل</label>
          <input id="closeNote" placeholder="اختياري" />
        </div>
      </div>
      <div class="row" style="margin-top:12px;">
        <button class="btn btn-warn" onclick="closeShiftNow()">اعتماد قفل الوردية وطباعة التقرير</button>
        <button class="btn btn-outline" onclick="window.print()">طباعة قبل القفل</button>
      </div>
    </div>
  `);
}
function closeShiftNow(){
  const sh = currentShift();
  if(!sh) return;
  const d = shiftData(sh.id);
  sh.end = new Date().toISOString();
  sh.status = "closed";
  sh.closingCash = Number($("closingCash").value || 0);
  sh.closeNote = $("closeNote").value.trim();
  sh.totals = {
    totalSales:d.totalSales,
    totalExpenses:d.totalExpenses,
    net:d.net,
    invoices:d.sales.length
  };
  saveDB();
  $("shiftCloseReport").innerHTML = shiftReportHTML(sh, d, true);
  toast("تم قفل الوردية.");
  window.print();
  closeModal();
  showPage("shift");
}

    <div class="receipt-head">

      <p>${db.settings.address}</p>
      <p>${db.settings.phone}</p>

    </div>
    <div class="receipt-info">
      <div>الكاشير: <b>${sh.cashierName}</b></div>
      <div>رقم الوردية: <b>${sh.id}</b></div>
      <div>بداية الوردية: <b>${new Date(sh.start).toLocaleString("ar-EG")}</b></div>
      <div>نهاية الوردية: <b>${sh.end ? new Date(sh.end).toLocaleString("ar-EG") : "-"}</b></div>
      <div>عهدة البداية: <b>${money(sh.openingCash)}</b></div>
      <div>النقدية عند القفل: <b>${money(sh.closingCash)}</b></div>

      <div class="sum-row total"><span>الصافي النهائي = المبيعات - المصروفات</span><b>${money(d.net)}</b></div>

function expensesCompact(expenses){
  if(!expenses.length) return `<div class="cart-empty">لا توجد مصروفات</div>`;
  return expenses.map(e=>`
    <div class="sum-row">
      <span>${e.title} — ${e.category}</span>
      <b>${money(e.amount)}</b>
    </div>
  `).join("");
}

function setOrderType(t){orderType=t; renderPOS()}
function setPayment(p){paymentType=p; renderPOS()}
function getCategories(){
  return ["الكل", ...new Set(db.products.filter(p=>p.active).map(p=>p.category || "بدون قسم"))];
}
function renderCategories(){
  const box = $("categoryTabs");
  if(!box) return;
  box.innerHTML = getCategories().map(c=>`<button class="tab ${activeCategory===c?"active":""}" onclick="activeCategory='${safe(c)}'; renderCategories(); renderMenu();">${c}</button>`).join("");
}
function safe(s){return String(s).replace(/'/g,"\\'")}
function renderMenu(){
  const grid = $("menuGrid");
  if(!grid) return;
  const q = $("posSearch")?.value.trim() || "";
  const items = db.products.filter(p=>p.active)
    .filter(p=>activeCategory==="الكل" || p.category===activeCategory)
    .filter(p=>!q || p.name.includes(q) || p.category.includes(q) || String(p.price).includes(q));
  grid.innerHTML = items.map(p=>`
    <button class="menu-item" onclick="addToCart(${p.id})">
      <span class="name">${p.name}</span>
      <span class="meta"><span class="badge">${p.category}</span><span class="price">${money(p.price)}</span></span>
    </button>
  `).join("") || `<div class="cart-empty" style="grid-column:1/-1;">لا توجد منتجات</div>`;
}
function addToCart(id){
  const p = db.products.find(x=>x.id===id);
  if(!p) return;
  const found = cart.find(i=>i.id===id);
  if(found) found.qty++;
  else cart.push({id:p.id,name:p.name,category:p.category,price:Number(p.price),qty:1});
  renderReceipt();
}
function changeQty(id,delta){
  const item = cart.find(i=>i.id===id);
  if(!item) return;
  item.qty += delta;
  if(item.qty <= 0) cart = cart.filter(i=>i.id!==id);
  renderReceipt();
}
function removeCartItem(id){cart = cart.filter(i=>i.id!==id); renderReceipt()}
function cartTotals(){
  const subtotal = cart.reduce((sum,i)=>sum+i.price*i.qty,0);
  const service = Number($("posService")?.value || 0);
  const delivery = Number($("posDelivery")?.value || 0);
  const discount = Number($("posDiscount")?.value || 0);
  const total = Math.max(0, subtotal + service + delivery - discount);
  return {subtotal,service,delivery,discount,total};
}
function renderReceipt(){
  const box = $("receiptArea");
  if(!box) return;
  const sh = currentShift();
  const t = cartTotals();
  box.innerHTML = `
    <div class="printable" id="saleReceipt">
      <div class="receipt-head">
        <h2>${db.settings.restaurantName}</h2>
        <p>${db.settings.address}</p>
        <p>${db.settings.phone}</p>
      </div>
      <div class="receipt-info">
        <div>الكاشير: <b>${session.name}</b></div>
        <div>الوردية: <b>${sh ? sh.id : "-"}</b></div>
        <div>نوع الطلب: <b>${orderType}</b></div>
        <div>الدفع: <b>${paymentType}</b></div>
        <div>التاريخ: <b>${new Date().toLocaleString("ar-EG")}</b></div>
        <div>ترابيزة: <b>${$("posTable")?.value || "-"}</b></div>
        <div>العميل: <b>${$("posCustomer")?.value || "-"}</b></div>
        <div>الهاتف: <b>${$("posPhone")?.value || "-"}</b></div>
      </div>
      ${cart.length ? cart.map(i=>`
        <div class="cart-line">
          <div class="line-top"><span>${i.name}</span><span>${money(i.price*i.qty)}</span></div>
          <div class="line-sub">${i.qty} × ${money(i.price)}</div>
          <div class="qty-row no-print">
            <div class="qty-controls">
              <button class="round" onclick="changeQty(${i.id},1)">+</button>
              <b>${i.qty}</b>
              <button class="round" onclick="changeQty(${i.id},-1)">-</button>
            </div>
            <button class="round del" onclick="removeCartItem(${i.id})">×</button>
          </div>
        </div>
      `).join("") : `<div class="cart-empty">الفاتورة فارغة</div>`}
      <div class="summary">
        <div class="sum-row"><span>الإجمالي</span><b>${money(t.subtotal)}</b></div>
        <div class="sum-row"><span>خدمة</span><b>${money(t.service)}</b></div>
        <div class="sum-row"><span>دليفري</span><b>${money(t.delivery)}</b></div>
        <div class="sum-row"><span>خصم</span><b>${money(t.discount)}</b></div>
        <div class="sum-row total"><span>المطلوب</span><b>${money(t.total)}</b></div>
      </div>
      ${$("posNote")?.value.trim() ? `<div class="hint">ملاحظات: <b>${$("posNote").value.trim()}</b></div>` : ""}
      <p class="footer-note">شكرًا لزيارتكم</p>
    </div>
  `;
}
function completeSale(printIt){
  const sh = currentShift();
  if(!sh){toast("افتح وردية أولًا.");return}
  if(!cart.length){toast("الفاتورة فارغة.");return}
  const t = cartTotals();
  const sale = {

function exportReportCSV(){
  const from = $("reportFrom")?.value || todayStr();
  const to = $("reportTo")?.value || todayStr();
  const cashier = $("reportCashier")?.value || "all";
  let sales = db.sales.filter(s=>dateOnly(s.date)>=from && dateOnly(s.date)<=to);
  let expenses = db.expenses.filter(e=>dateOnly(e.date)>=from && dateOnly(e.date)<=to);
  if(cashier !== "all"){
    sales = sales.filter(s=>String(s.cashierId)===cashier);
    expenses = expenses.filter(e=>String(e.cashierId)===cashier);
  }
  const rows = [["نوع","التاريخ","الكاشير","الوردية","الوصف","المبلغ"]];
  sales.forEach(s=>rows.push(["مبيعات",new Date(s.date).toLocaleString("ar-EG"),s.cashierName,s.shiftId,"فاتورة "+s.invoice,s.total]));
  expenses.forEach(e=>rows.push(["مصروف",new Date(e.date).toLocaleString("ar-EG"),e.cashierName,e.shiftId,e.title,e.amount]));
  const csv = "\ufeff" + rows.map(r=>r.map(c=>`"${String(c??"").replace(/"/g,'""')}"`).join(",")).join("\n");
  downloadFile(csv, `تقرير_الريان_${from}_إلى_${to}.csv`, "text/csv;charset=utf-8");
}

function previewDiff(id,oldPrice){
  const v = Number($(`np-${id}`).value || 0);
  const diff = v - Number(oldPrice || 0);
  const el = $(`df-${id}`);
  el.textContent = money(diff);
  el.style.color = diff>0 ? "var(--good)" : diff<0 ? "var(--bad)" : "var(--muted)";
}
function savePrice(id){
  const p = db.products.find(x=>x.id===id);
  const newPrice = Number($(`np-${id}`).value || 0);
  if(!p || newPrice<=0){toast("اكتب سعرًا صحيحًا.");return}
  const oldPrice = Number(p.price || 0);
  if(newPrice===oldPrice){toast("السعر لم يتغير.");return}
  p.price = newPrice;
  db.priceHistory.push({id:uid(),date:new Date().toISOString(),productId:p.id,productName:p.name,category:p.category,oldPrice,newPrice,diff:newPrice-oldPrice,userName:session.name,type:"تعديل مباشر"});
  saveDB();
  toast("تم تحديث السعر.");
  renderPrices();
}
function showBulkPriceModal(){
  showModal(`
    <div class="modal-head">
      <h2>تعديل جماعي للأسعار</h2>
      <button class="btn btn-soft" onclick="closeModal()">×</button>
    </div>
    <div class="form-grid-2">
      <div><label>القسم</label><select id="bulkCat">${getCategories().filter(c=>c!=="الكل").map(c=>`<option value="${c}">${c}</option>`).join("")}</select></div>
      <div><label>نوع التعديل</label><select id="bulkMode"><option value="plusPercent">زيادة بنسبة %</option><option value="minusPercent">خصم بنسبة %</option><option value="plusFixed">زيادة مبلغ ثابت</option><option value="minusFixed">خصم مبلغ ثابت</option></select></div>
      <div><label>القيمة</label><input id="bulkValue" type="number" min="0" /></div>
      <div><label>تقريب السعر</label><select id="bulkRound"><option value="1">بدون تقريب</option><option value="5">أقرب 5 جنيه</option><option value="10">أقرب 10 جنيه</option></select></div>
    </div>
    <button class="btn btn-warn btn-full" onclick="applyBulkPrice()">تطبيق</button>
  `);
}
function applyBulkPrice(){
  const cat = $("bulkCat").value;
  const mode = $("bulkMode").value;
  const value = Number($("bulkValue").value || 0);
  const round = Number($("bulkRound").value || 1);
  if(value<=0){toast("اكتب قيمة صحيحة.");return}
  if(!confirm("سيتم تعديل أسعار قسم كامل. هل أنت متأكد؟")) return;
  let changed = 0;
  db.products.filter(p=>p.active && p.category===cat).forEach(p=>{
    const oldPrice = Number(p.price || 0);
    let newPrice = oldPrice;
    if(mode==="plusPercent") newPrice = oldPrice * (1 + value/100);
    if(mode==="minusPercent") newPrice = oldPrice * (1 - value/100);
    if(mode==="plusFixed") newPrice = oldPrice + value;
    if(mode==="minusFixed") newPrice = oldPrice - value;
    newPrice = Math.max(1, Math.round(newPrice / round) * round);
    if(newPrice !== oldPrice){
      p.price = newPrice;
      db.priceHistory.push({id:uid(),date:new Date().toISOString(),productId:p.id,productName:p.name,category:p.category,oldPrice,newPrice,diff:newPrice-oldPrice,userName:session.name,type:"تعديل جماعي"});
      changed++;
    }
  });
  saveDB();
  closeModal();
  renderPrices();
  toast("تم تعديل أسعار " + changed + " صنف.");
}

function saveProduct(id){
  const name = $("mProductName").value.trim();
  const category = $("mProductCategory").value.trim();
  const price = Number($("mProductPrice").value || 0);
  const active = $("mProductActive").value === "true";
  if(!name || !category || price<=0){toast("أكمل بيانات المنتج.");return}
  if(id){
    const p = db.products.find(x=>x.id===id);
    const oldPrice = Number(p.price || 0);
    p.name=name; p.category=category; p.price=price; p.active=active;
    if(price!==oldPrice){
      db.priceHistory.push({id:uid(),date:new Date().toISOString(),productId:p.id,productName:name,category,oldPrice,newPrice:price,diff:price-oldPrice,userName:session.name,type:"تعديل من المنتجات"});
    }
  }else{
    db.products.push({id:uid(),name,category,price,active});
  }
  saveDB(); closeModal(); renderProducts(); toast("تم حفظ المنتج.");
}
function toggleProduct(id){
  const p = db.products.find(x=>x.id===id);
  if(!p) return;
  p.active = !p.active;
  saveDB(); renderProducts();

function deleteProduct(id){
  if(!confirm("حذف المنتج نهائيًا؟")) return;
  db.products = db.products.filter(p=>p.id!==id);
  saveDB(); renderProducts();
}

function saveSettings(){
  db.settings.restaurantName = $("setName").value.trim() || "مطعم الريان";
  db.settings.phone = $("setPhone").value.trim();
  db.settings.address = $("setAddress").value.trim();
  db.settings.serviceDefault = Number($("setService").value || 0);
  db.settings.deliveryDefault = Number($("setDelivery").value || 0);
  saveDB();
  toast("تم حفظ الإعدادات.");
}
function resetData(){
  if(!confirm("سيتم حذف كل بيانات هذه النسخة والرجوع للبداية. هل أنت متأكد؟")) return;
  localStorage.removeItem(STORAGE_KEY);
  sessionStorage.removeItem("rayyanSessionV3");
  location.reload();
}

function groupSum(items,key,amountKey){
  const map = {};
  items.forEach(i=>{
    const k = i[key] || "غير محدد";
    map[k] = (map[k] || 0) + Number(i[amountKey] || 0);
  });
  return Object.entries(map).map(([name,total])=>({name,total}));
}
function getTopItemsFromSales(sales){
  const map = {};
  sales.forEach(s=>(s.items||[]).forEach(i=>{
    if(!map[i.name]) map[i.name] = {name:i.name,qty:0,total:0};
    map[i.name].qty += Number(i.qty||0);
    map[i.name].total += Number(i.qty||0)*Number(i.price||0);
  }));
  return Object.values(map).sort((a,b)=>b.qty-a.qty);
}
function itemsList(items){
  if(!items.length) return `<div class="cart-empty">لا توجد أصناف</div>`;
  return `<ol class="mini-list">${items.map(i=>`<li><b>${i.name}</b>: ${i.qty} قطعة — ${money(i.total)}</li>`).join("")}</ol>`;
}
function simpleMoneyList(items){
  if(!items.length) return `<div class="cart-empty">لا توجد بيانات</div>`;
  return items.map(i=>`<div class="sum-row"><span>${i.name}</span><b>${money(i.total)}</b></div>`).join("");
}

  const sh = db.shifts.find(s=>s.id===id);
  if(!sh) return;
  const d = shiftData(id);
  showModal(`
    <div class="modal-head no-print">
      <h2>تقرير وردية</h2>
      <button class="btn btn-soft" onclick="closeModal()">×</button>
    </div>
    <div class="printable">
      ${shiftReportHTML(sh,d,sh.status==="closed")}
    </div>
    <div class="row no-print" style="margin-top:12px;">
      <button class="btn btn-outline" onclick="window.print()">طباعة</button>
    </div>
  `);
}

function showModal(html){
  $("modal").innerHTML = `<div class="modal-card">${html}</div>`;
  $("modal").classList.remove("hidden");
}
function closeModal(){
  $("modal").classList.add("hidden");
  $("modal").innerHTML = "";
}
window.onclick = (e)=>{if(e.target===$("modal")) closeModal()};

function backupData(){
  downloadFile(JSON.stringify(db,null,2), `نسخة_احتياطية_الريان_${todayStr()}.json`, "application/json;charset=utf-8");
}
function restoreData(event){
  const file = event.target.files[0];
  if(!file) return;
  const r = new FileReader();
  r.onload = ()=>{
    try{
      const data = JSON.parse(r.result);
      if(!data.users || !data.products || !data.shifts) throw new Error("bad");
      db = data;
      saveDB();
      toast("تم استرجاع النسخة.");
      setTimeout(()=>location.reload(),700);
    }catch(e){toast("ملف النسخة غير صحيح.")}
  };
  r.readAsText(file);
}
function downloadFile(content, filename, type){
  const blob = new Blob([content], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename; document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
