<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>حساب العميل</title><link rel="stylesheet" href="assets/marketplace.css"></head><body><div id="header"></div><section class="page-banner"><div class="container"><h1>حسابي وطلباتي</h1><p class="muted">مرحبًا <span id="customer"></span>، تابع طلباتك من جميع المتاجر.</p></div></section><main class="section"><div class="container"><div class="panel"><div class="section-head"><h2>الطلبات السابقة</h2><button class="btn btn-outline btn-sm" onclick="logout()">تسجيل الخروج</button></div><div id="orders" class="table-wrap"></div></div></div></main><script src="assets/common.js"></script><script>header.innerHTML=renderHeader();if(!State.user||State.user.role!=='customer')location.href='account.html';customer.textContent=State.user?.name||'';(async()=>{try{const list=await API.get('/api/customer/orders');orders.innerHTML=list.length?`<table><thead><tr><th>رقم الطلب</th><th>المتاجر</th><th>العناصر</th><th>الإجمالي</th><th>الحالة</th><th>التاريخ</th></tr></thead><tbody>${list.map(o=>`<tr><td>${esc(o.order_number)}</td><td>${o.stores_count}</td><td>${o.items_count}</td><td>${money(o.total)}</td><td>${statusBadge(o.status)}</td><td>${esc(o.created_at)}</td></tr>`).join('')}</tbody></table>`:'<div class="empty">لم تنفذ أي طلبات بعد.</div>'}catch(e){orders.innerHTML=`<div class="empty">${esc(e.message)}</div>`}})()</script></body></html>
