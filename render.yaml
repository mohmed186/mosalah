services:
  - type: web
    name: nest-marketplace
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_FILE
        value: /var/data/marketplace.db
      - key: SEED_DEMO_DATA
        value: true
      - key: OWNER_NAME
        sync: false
      - key: OWNER_EMAIL
        sync: false
      - key: OWNER_PASSWORD
        sync: false
    disk:
      name: marketplace-data
      mountPath: /var/data
      sizeGB: 1
