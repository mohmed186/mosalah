<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="description" content="تفاصيل المنتج والسعر والتقييمات وخيارات الشراء من المتاجر المعتمدة."><title>تفاصيل المنتج</title><link rel="stylesheet" href="assets/marketplace.css"></head><body><div id="header"></div><main class="section"><div class="container"><div id="productView" class="card" style="padding:25px"></div><section class="section"><div class="section-head"><div><h2>تقييمات العملاء</h2><p>التقييمات المعتمدة من إدارة المنصة.</p></div></div><form id="reviewForm" class="panel hidden"><div class="form-row"><div class="form-group"><label>التقييم</label><select id="reviewRating" class="select"><option value="5">5 نجوم</option><option value="4">4 نجوم</option><option value="3">3 نجوم</option><option value="2">نجمتان</option><option value="1">نجمة واحدة</option></select></div><div class="form-group"><label>تعليقك</label><input id="reviewComment" class="field" placeholder="اكتب رأيك في المنتج"></div></div><button class="btn btn-primary">إرسال التقييم للمراجعة</button></form><div id="reviews" class="grid grid-3"></div></section></div></main><script src="assets/common.js"></script><script>header.innerHTML=renderHeader('shop');(async()=>{try{const id=new URLSearchParams(location.search).get('id');const p=await API.get('/api/products/'+id);document.title=p.name;productView.innerHTML=`<div class="grid grid-2" style="align-items:center"><div class="product-image" style="height:430px;border-radius:18px"><img src="${imageSrc(p.image)}"></div><div><span class="badge badge-success">متاح</span><h1 style="font-size:38px;margin:12px 0">${esc(p.name)}</h1><a class="store-link" href="vendor-details.html?store=${encodeURIComponent(p.store_slug)}">البائع: ${esc(p.store_name)}</a><div class="rating">★ ${Number(p.rating||0).toFixed(1)} (${p.reviews_count})</div><p class="muted" style="line-height:1.9">${esc(p.description||'')}</p><p>المخزون: <strong>${p.stock}</strong></p><div class="price" style="font-size:30px;margin:18px 0">${money(p.price)} ${p.compare_price?`<span class="compare">${money(p.compare_price)}</span>`:''}</div><button id="add" class="btn btn-primary">أضف إلى السلة</button></div></div>`;document.getElementById('add').onclick=()=>addToCart(p);if(State.user?.role==='customer'){reviewForm.classList.remove('hidden');reviewForm.onsubmit=async e=>{e.preventDefault();try{const d=await API.post('/api/products/'+p.id+'/reviews',{rating:reviewRating.value,comment:reviewComment.value});toast(d.message);reviewForm.reset()}catch(err){toast(err.message,true)}}}reviews.innerHTML=p.reviews.map(r=>`<div class="card" style="padding:18px"><strong>${esc(r.name)}</strong><div class="rating">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div><p class="muted">${esc(r.comment)}</p></div>`).join('')||'<div class="empty">لا توجد تقييمات حتى الآن.</div>'}catch(e){productView.innerHTML=`<div class="empty">${esc(e.message)}</div>`}})()</script></body></html>
