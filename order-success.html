<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>تم الطلب</title><link rel="stylesheet" href="assets/marketplace.css"></head><body><div id="header"></div><main class="section"><div class="container"><div class="card" style="max-width:650px;margin:auto;padding:40px;text-align:center"><div class="category-icon" style="width:80px;height:80px;font-size:40px">✓</div><h1>تم تسجيل طلبك بنجاح</h1><p class="muted">قام النظام بتقسيم الطلب إلى طلبات فرعية لكل متجر، ويمكن لكل بائع تحديث حالة الجزء الخاص به.</p><div id="details" class="panel" style="text-align:right"></div><a class="btn btn-primary" href="shop.html">متابعة التسوق</a> <a class="btn btn-outline" href="customer-dashboard.html">طلباتي</a></div></div></main><script src="assets/common.js"></script><script>header.innerHTML=renderHeader();const o=JSON.parse(localStorage.getItem('lastOrder')||'null');details.innerHTML=o?`<div class="summary-line"><span>رقم الطلب</span><strong>${esc(o.orderNumber)}</strong></div><div class="summary-line"><span>عدد المتاجر</span><strong>${o.vendors}</strong></div><div class="summary-line"><span>الإجمالي</span><strong>${money(o.total)}</strong></div>`:'<p>لا توجد بيانات طلب حديث.</p>';</script></body></html>
