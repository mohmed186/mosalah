<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="description" content="تعرف على المتجر ومنتجاته المعتمدة داخل منصة التجارة الإلكترونية."><title>تفاصيل المتجر</title><link rel="stylesheet" href="assets/marketplace.css"></head><body><div id="header"></div><main class="container"><div id="storeHero"></div><section class="section"><div class="section-head"><div><h2>منتجات المتجر</h2><p>المنتجات المعتمدة والمتاحة حاليًا.</p></div></div><div id="products" class="grid grid-4"></div></section></main><script src="assets/common.js"></script><script>header.innerHTML=renderHeader('vendors');(async()=>{try{const slug=new URLSearchParams(location.search).get('store');const s=await API.get('/api/stores/'+encodeURIComponent(slug));document.title=s.name;storeHero.innerHTML=`<div class="store-hero"><img class="store-logo" src="${imageSrc(s.logo)}"><div><span class="badge badge-success">متجر معتمد</span><h1>${esc(s.name)}</h1><p class="muted">${esc(s.description)}</p><small>${esc(s.city||'')} ${s.phone?'• '+esc(s.phone):''}</small></div><a class="btn btn-primary" href="shop.html?store=${encodeURIComponent(s.slug)}">تسوق الآن</a></div>`;products.innerHTML=s.products.map(p=>`<article class="card product-card"><a class="product-image" href="product.html?id=${p.id}"><img src="${imageSrc(p.image)}"></a><div class="product-body"><span class="product-category">${esc(p.category_name||'')}</span><a class="product-title" href="product.html?id=${p.id}">${esc(p.name)}</a><div class="rating">★ ${Number(p.rating||0).toFixed(1)}</div><div class="price-row"><span class="price">${money(p.price)}</span><button class="btn btn-primary btn-sm" data-add="${p.id}">أضف للسلة</button></div></div></article>`).join('')||'<div class="empty">لا توجد منتجات حاليًا.</div>';document.querySelectorAll('[data-add]').forEach(b=>b.onclick=()=>addToCart(s.products.find(p=>p.id==b.dataset.add)))}catch(e){storeHero.innerHTML=`<div class="empty">${esc(e.message)}</div>`}})()</script></body></html>
