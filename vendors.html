<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="description" content="تصفح المتاجر والبائعين المعتمدين والمنتجات المتاحة داخل المنصة."><title>المتاجر</title><link rel="stylesheet" href="assets/marketplace.css"></head><body><div id="header"></div><section class="page-banner"><div class="container"><h1>المتاجر المعتمدة</h1><p class="muted">كل بائع يملك متجرًا مستقلًا ولوحة لإدارة منتجاته وطلباته.</p></div></section><main class="section"><div class="container"><div id="stores" class="grid grid-3"></div></div></main><script src="assets/common.js"></script><script>header.innerHTML=renderHeader('vendors');(async()=>{const list=await API.get('/api/stores');stores.innerHTML=list.map(s=>`<article class="card store-card"><div class="store-top"><img class="store-logo" src="${imageSrc(s.logo)}"><div><h3>${esc(s.name)}</h3><span class="badge badge-success">معتمد</span></div></div><p>${esc(s.description||'متجر داخل المنصة')}</p><div class="price-row"><span class="muted">${s.city?esc(s.city)+' • ':''}${s.products_count} منتج</span><a class="btn btn-primary btn-sm" href="vendor-details.html?store=${encodeURIComponent(s.slug)}">عرض المتجر</a></div></article>`).join('')||'<div class="empty">لا توجد متاجر معتمدة بعد.</div>'})()</script></body></html>
