<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="description" content="تصفح منتجات متنوعة من متاجر وبائعين معتمدين داخل منصة التجارة الإلكترونية."><title>المنتجات</title><link rel="stylesheet" href="assets/marketplace.css"></head><body><div id="header"></div><section class="page-banner"><div class="container"><h1>كل المنتجات</h1><p class="muted">ابحث بين منتجات المتاجر المعتمدة داخل المنصة.</p></div></section><main class="section"><div class="container"><div class="toolbar"><input id="search" class="field" placeholder="ابحث عن منتج أو متجر..."><select id="category" class="select"><option value="">كل الأقسام</option></select><button class="btn btn-primary" id="searchBtn">بحث</button></div><div id="resultMeta" class="muted" style="margin-bottom:16px"></div><div id="products" class="grid grid-4"></div></div></main><footer class="footer"><div class="container"><p>جميع المنتجات المعروضة تخضع لمراجعة إدارة المنصة.</p></div></footer><script src="assets/common.js"></script><script>
header.innerHTML=renderHeader('shop');let current=[];
function card(p){return `<article class="card product-card"><a class="product-image" href="product.html?id=${p.id}"><img src="${imageSrc(p.image)}"></a><div class="product-body"><span class="product-category">${esc(p.category_name||'بدون قسم')}</span><a class="product-title" href="product.html?id=${p.id}">${esc(p.name)}</a><a class="store-link" href="vendor-details.html?store=${encodeURIComponent(p.store_slug)}">${esc(p.store_name)}</a><div class="rating">★ ${Number(p.rating||0).toFixed(1)}</div><div class="price-row"><span class="price">${money(p.price)}</span><button class="btn btn-primary btn-sm" data-add="${p.id}">أضف للسلة</button></div></div></article>`}
async function load(){products.innerHTML='<div class="empty">جاري التحميل...</div>';const params=new URLSearchParams();if(search.value)params.set('q',search.value);if(category.value)params.set('category',category.value);current=await API.get('/api/products?'+params);products.innerHTML=current.map(card).join('')||'<div class="empty">لا توجد نتائج مطابقة.</div>';resultMeta.textContent=`تم العثور على ${current.length} منتج`;document.querySelectorAll('[data-add]').forEach(b=>b.onclick=()=>addToCart(current.find(p=>p.id==b.dataset.add)))}
(async()=>{const cats=await API.get('/api/categories');category.innerHTML+='' + cats.map(c=>`<option value="${esc(c.slug)}">${esc(c.name)}</option>`).join('');const q=new URLSearchParams(location.search);search.value=q.get('q')||'';category.value=q.get('category')||'';await load()})();searchBtn.onclick=load;search.onkeydown=e=>{if(e.key==='Enter')load()};
</script></body></html>
