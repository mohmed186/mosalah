<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>لوحة البائع</title><link rel="stylesheet" href="assets/marketplace.css"></head><body><div class="dashboard-layout"><aside class="sidebar"><a class="brand" href="index.html"><span class="brand-mark">N</span><span>لوحة البائع</span></a><nav class="sidebar-nav"><button class="active" data-tab="overview">الرئيسية</button><button data-tab="products">المنتجات</button><button data-tab="orders">الطلبات</button><button data-tab="payouts">الأرباح والسحب</button><button data-tab="store">إعدادات المتجر</button><a href="index.html">عرض المنصة</a><button onclick="logout()">تسجيل الخروج</button></nav></aside><main class="dashboard-main"><div class="dashboard-head"><div><span class="kicker">Vendor Center</span><h1 id="storeTitle">لوحة البائع</h1></div><span id="storeStatus"></span></div><div id="pendingBox"></div>
<section id="overview" class="tab-page"><div id="vendorStats" class="stat-grid"></div><div class="panel"><h2>أحدث الطلبات</h2><div id="recentOrders" class="table-wrap"></div></div></section>
<section id="products" class="tab-page hidden"><div class="panel"><div class="section-head"><div><h2>منتجات متجرك</h2><p>المنتجات الجديدة والتعديلات تحتاج موافقة الإدارة.</p></div><button id="addProductBtn" class="btn btn-primary">إضافة منتج</button></div><div id="productsTable" class="table-wrap"></div></div></section>
<section id="orders" class="tab-page hidden"><div class="panel"><h2>طلبات متجرك</h2><div id="ordersTable" class="table-wrap"></div></div></section>
<section id="payouts" class="tab-page hidden"><div id="balanceCards" class="stat-grid"></div><div class="panel"><h2>طلب سحب أرباح</h2><form id="payoutForm"><div class="form-row"><div class="form-group"><label>المبلغ</label><input id="payoutAmount" class="field" type="number" min="1" required></div><div class="form-group"><label>طريقة الاستلام</label><select id="payoutMethod" class="select"><option value="bank_transfer">تحويل بنكي</option><option value="vodafone_cash">Vodafone Cash</option><option value="instapay">InstaPay</option></select></div></div><div class="form-group"><label>بيانات الحساب أو رقم المحفظة</label><input id="accountDetails" class="field" required></div><button class="btn btn-primary">إرسال الطلب</button></form></div><div class="panel"><h2>سجل طلبات السحب</h2><div id="payoutsTable" class="table-wrap"></div></div></section>
<section id="store" class="tab-page hidden"><div class="panel"><h2>بيانات المتجر</h2><form id="storeForm"><div class="form-row"><div class="form-group"><label>اسم المتجر</label><input id="storeName" class="field"></div><div class="form-group"><label>المدينة</label><input id="storeCity" class="field"></div></div><div class="form-row"><div class="form-group"><label>الهاتف</label><input id="storePhone" class="field"></div><div class="form-group"><label>رابط/اسم صورة الشعار</label><input id="storeLogo" class="field"></div></div><div class="form-group"><label>وصف المتجر</label><textarea id="storeDescription" class="textarea" rows="4"></textarea></div><button class="btn btn-primary">حفظ</button></form></div></section>
</main></div>
<div id="productModal" class="modal"><div class="modal-card"><div class="modal-head"><h3 id="productModalTitle">إضافة منتج</h3><button class="close" onclick="closeProductModal()">×</button></div><form id="productForm"><input type="hidden" id="productId"><div class="form-row"><div class="form-group"><label>اسم المنتج</label><input id="productName" class="field" required></div><div class="form-group"><label>القسم</label><select id="productCategory" class="select"></select></div></div><div class="form-row"><div class="form-group"><label>السعر</label><input id="productPrice" class="field" type="number" min="0" step="0.01" required></div><div class="form-group"><label>السعر قبل الخصم</label><input id="productCompare" class="field" type="number" min="0" step="0.01"></div></div><div class="form-row"><div class="form-group"><label>المخزون</label><input id="productStock" class="field" type="number" min="0" required></div><div class="form-group"><label>رابط أو اسم الصورة</label><input id="productImage" class="field" placeholder="رابط أو اسم ملف"></div></div><div class="form-group"><label>أو ارفع صورة من جهازك (حد أقصى 1.5MB)</label><input id="productImageFile" class="field" type="file" accept="image/*"></div><div class="form-group"><label>الوصف</label><textarea id="productDescription" class="textarea" rows="4"></textarea></div><button class="btn btn-primary">حفظ وإرسال للمراجعة</button></form></div></div>
<script src="assets/common.js"></script><script>
if(!State.user||State.user.role!=='vendor')location.href='account.html';let dashboardData=null,productList=[],categories=[];const tabButtons=[...document.querySelectorAll('[data-tab]')];tabButtons.forEach(b=>b.onclick=()=>{tabButtons.forEach(x=>x.classList.toggle('active',x===b));document.querySelectorAll('.tab-page').forEach(s=>s.classList.toggle('hidden',s.id!==b.dataset.tab));loadTab(b.dataset.tab)});
function table(rows,headers,render){return rows.length?`<table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.map(render).join('')}</tbody></table>`:'<div class="empty">لا توجد بيانات.</div>'}
async function loadOverview(){dashboardData=await API.get('/api/vendor/dashboard');const d=dashboardData,s=d.store;storeTitle.textContent=s.name;storeStatus.innerHTML=statusBadge(s.status);pendingBox.innerHTML=s.status!=='approved'?`<div class="status-pending-box" style="margin-bottom:20px"><strong>حالة المتجر: ${statusBadge(s.status)}</strong><p>لن تتمكن من نشر منتجات جديدة قبل اعتماد المتجر من مالك المنصة.</p></div>`:'';vendorStats.innerHTML=[['إجمالي المبيعات',money(d.orderStats.sales)],['صافي مستحقاتك',money(d.orderStats.net)],['الرصيد المتاح',money(d.balance.available)],['عدد الطلبات',d.orderStats.total],['كل المنتجات',d.productStats.total],['منتجات معتمدة',d.productStats.approved||0],['قيد المراجعة',d.productStats.pending||0],['إجمالي المخزون',d.productStats.stock||0]].map(x=>`<div class="stat-card"><span>${x[0]}</span><strong>${x[1]}</strong></div>`).join('');recentOrders.innerHTML=table(d.recentOrders,['الطلب','العميل','العناصر','الإجمالي','صافي البائع','الحالة'],o=>`<tr><td>${esc(o.order_number)}</td><td>${esc(o.customer_name)}</td><td>${o.items_count}</td><td>${money(o.subtotal)}</td><td>${money(o.vendor_net)}</td><td>${statusBadge(o.status)}</td></tr>`);storeName.value=s.name;storeCity.value=s.city||'';storePhone.value=s.phone||'';storeLogo.value=s.logo||'';storeDescription.value=s.description||''}
async function loadProducts(){[productList,categories]=await Promise.all([API.get('/api/vendor/products'),API.get('/api/categories')]);productCategory.innerHTML='<option value="">بدون قسم</option>'+categories.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('');productsTable.innerHTML=table(productList,['المنتج','القسم','السعر','المخزون','الحالة','إجراء'],p=>`<tr><td style="display:flex;align-items:center;gap:9px"><img class="thumb" src="${imageSrc(p.image)}"><strong>${esc(p.name)}</strong></td><td>${esc(p.category_name||'—')}</td><td>${money(p.price)}</td><td>${p.stock}</td><td>${statusBadge(p.status)}</td><td><button class="btn btn-outline btn-sm" onclick="editProduct(${p.id})">تعديل</button></td></tr>`)}
function openProductModal(p=null){productModal.classList.add('open');productModalTitle.textContent=p?'تعديل المنتج':'إضافة منتج';productId.value=p?.id||'';productName.value=p?.name||'';productCategory.value=p?.category_id||'';productPrice.value=p?.price||'';productCompare.value=p?.compare_price||'';productStock.value=p?.stock||0;productImage.value=p?.image||'';productDescription.value=p?.description||''}function closeProductModal(){productModal.classList.remove('open')}function editProduct(id){openProductModal(productList.find(p=>p.id===id))}addProductBtn.onclick=()=>openProductModal();
async function fileData(file){if(!file)return '';if(file.size>1.5*1024*1024)throw new Error('حجم الصورة أكبر من 1.5MB');return await new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>resolve(r.result);r.onerror=()=>reject(new Error('تعذر قراءة الصورة'));r.readAsDataURL(file)})}productForm.onsubmit=async e=>{e.preventDefault();try{const uploaded=await fileData(productImageFile.files[0]);const payload={name:productName.value,categoryId:productCategory.value||null,price:productPrice.value,comparePrice:productCompare.value,stock:productStock.value,image:uploaded||productImage.value,description:productDescription.value};if(productId.value)await API.put('/api/vendor/products/'+productId.value,payload);else await API.post('/api/vendor/products',payload);toast('تم حفظ المنتج وإرساله للمراجعة');productImageFile.value='';closeProductModal();loadProducts();loadOverview()}catch(err){toast(err.message,true)}};
async function loadOrders(){const list=await API.get('/api/vendor/orders');ordersTable.innerHTML=table(list,['الطلب والعميل','العناصر','العنوان','الإجمالي','العمولة','صافي البائع','الحالة','تحديث'],o=>`<tr><td><strong>${esc(o.order_number)}</strong><br>${esc(o.customer_name)}<br><small>${esc(o.phone)}</small></td><td>${o.items.map(i=>`${esc(i.name)} × ${i.quantity}`).join('<br>')}</td><td>${esc(o.city)}<br><small>${esc(o.address)}</small></td><td>${money(o.subtotal)}</td><td>${money(o.commission_amount)} (${o.commission_rate}%)</td><td>${money(o.vendor_net)}</td><td>${statusBadge(o.status)}</td><td><select class="select" style="width:150px;padding:7px" onchange="changeOrder(${o.id},this.value)"><option value="">تغيير الحالة</option><option value="processing">قيد التجهيز</option><option value="shipped">تم الشحن</option><option value="delivered">تم التسليم</option><option value="cancelled">إلغاء</option></select></td></tr>`)}
async function changeOrder(id,status){if(!status)return;try{await API.patch('/api/vendor/orders/'+id,{status});toast('تم تحديث الطلب');loadOrders();loadOverview()}catch(e){toast(e.message,true)}}
async function loadPayouts(){const d=await API.get('/api/vendor/payouts');balanceCards.innerHTML=[['إجمالي الأرباح المستحقة',money(d.balance.earned)],['مبالغ محجوزة/مسحوبة',money(d.balance.reserved)],['متاح للسحب',money(d.balance.available)]].map(x=>`<div class="stat-card"><span>${x[0]}</span><strong>${x[1]}</strong></div>`).join('');payoutsTable.innerHTML=table(d.payouts,['المبلغ','الطريقة','بيانات الحساب','الحالة','التاريخ'],p=>`<tr><td>${money(p.amount)}</td><td>${esc(p.method)}</td><td>${esc(p.account_details)}</td><td>${statusBadge(p.status)}</td><td>${esc(p.created_at)}</td></tr>`)}
payoutForm.onsubmit=async e=>{e.preventDefault();try{await API.post('/api/vendor/payouts',{amount:payoutAmount.value,method:payoutMethod.value,accountDetails:accountDetails.value});toast('تم إرسال طلب السحب');payoutForm.reset();loadPayouts()}catch(err){toast(err.message,true)}};
storeForm.onsubmit=async e=>{e.preventDefault();try{await API.put('/api/vendor/store',{name:storeName.value,city:storeCity.value,phone:storePhone.value,logo:storeLogo.value,description:storeDescription.value});toast('تم حفظ بيانات المتجر');loadOverview()}catch(err){toast(err.message,true)}};
function loadTab(tab){({overview:loadOverview,products:loadProducts,orders:loadOrders,payouts:loadPayouts,store:loadOverview}[tab]||(()=>{}))()}loadOverview();
</script></body></html>
